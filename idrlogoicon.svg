<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="Institute of Digital Risk icon">
  <defs>
    <linearGradient id="cubeTopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeLeftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeRightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4d4d4d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cube top face -->
  <polygon points="40,8 68,24 40,40 12,24" fill="url(#cubeTopGrad)"/>
  <!-- Cube left face -->
  <polygon points="12,24 40,40 40,64 12,48" fill="url(#cubeLeftGrad)"/>
  <!-- Cube right face -->
  <polygon points="68,24 40,40 40,64 68,48" fill="url(#cubeRightGrad)"/>
  <!-- Alert triangle overlay -->
  <polygon points="40,18 50,36 30,36" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" opacity="0.9"/>
  <line x1="40" y1="23" x2="40" y2="30" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <circle cx="40" cy="33" r="1.2" fill="#ffffff" opacity="0.9"/>
</svg>